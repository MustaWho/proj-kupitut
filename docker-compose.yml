services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        NODE_IMAGE: public.ecr.aws/docker/library/node:20-alpine
        NGINX_IMAGE: public.ecr.aws/docker/library/nginx:1.27-alpine
    container_name: shop-frontend
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        PYTHON_IMAGE: public.ecr.aws/docker/library/python:3.11-slim
    container_name: shop-api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://projr:projr@db:5432/projr
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: shop-db
    environment:
      POSTGRES_DB: projr
      POSTGRES_USER: projr
      POSTGRES_PASSWORD: projr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projr -d projr"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
